<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ben Winans Bank - Transfer</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#081a33;
color:white;
min-height:100vh;
}

.header{
background:#0d2347;
padding:20px;
text-align:center;
font-size:28px;
font-weight:900;
letter-spacing:2px;
box-shadow:0 3px 15px rgba(0,0,0,.3);
position:relative;
}

.exit-btn{
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border:none;
border-radius:50%;
background:rgba(255,255,255,.1);
color:white;
font-size:22px;
cursor:pointer;
transition:.3s;
}

.exit-btn:hover{
background:rgba(255,255,255,.2);
}

.container{
max-width:500px;
margin:30px auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:18px;
padding:25px;
backdrop-filter:blur(10px);
animation:fadeIn .5s ease;
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
color:#7db7ff;
}

.group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
}

input,select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#10284d;
color:white;
font-size:15px;
outline:none;
}

input::placeholder{
color:#b8c6db;
}

.verify{
margin-top:8px;
font-size:13px;
color:#7db7ff;
min-height:20px;
}

.account-name{
font-weight:bold;
color:#7dffb1;
}

.send-btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#1f6fff;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.send-btn:hover{
transform:translateY(-2px);
background:#4589ff;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#10284d;
padding:25px;
width:90%;
max-width:400px;
border-radius:16px;
text-align:center;
}

.modal-box h2{
margin-bottom:15px;
}

.modal-box p{
line-height:1.6;
margin-bottom:20px;
}

.confirm-btn{
padding:12px 25px;
background:#1f6fff;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.loading{
display:none;
text-align:center;
padding:40px;
}

.spinner{
width:60px;
height:60px;
border:5px solid rgba(255,255,255,.2);
border-top:5px solid #1f6fff;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
}

.result{
display:none;
text-align:center;
padding:40px;
}

.result h2{
margin-top:15px;
color:#ff6b6b;
}

.result p{
margin-top:10px;
line-height:1.6;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>
<body>

<div class="header">
    TRANSFER

    <button class="exit-btn" onclick="exitTransfer()">
        ✕
    </button>
</div>

<div class="container">

<div class="card" id="transferCard">

<div class="title">
Send Money
</div>

<div class="group">
<label>Bank</label>
<select>
<option>Chase Bank</option>
<option>JPMorgan Chase</option>
<option>Bank of America</option>
<option>Citibank</option>
<option>Wells Fargo</option>
<option>U.S. Bank</option>
<option>Capital One</option>
<option>Truist Bank</option>
<option>PNC Bank</option>
<option>Goldman Sachs</option>
<option>TD Bank</option>
<option>BMO Bank</option>
<option>Citizens Bank</option>
<option>M&T Bank</option>
<option>Fifth Third Bank</option>
<option>Huntington National Bank</option>
<option>KeyBank</option>
<option>Ally Bank</option>
<option>American Express National Bank</option>
<option>HSBC Bank USA</option>
<option>Regions Bank</option>
</select>
</div>

<div class="group">
<label>Account Number</label>
<input
type="number"
id="accountNumber"
placeholder="Enter Account Number"
maxlength="10">
<div class="verify" id="verifyText"></div>
</div>

<div class="group">
<label>Account Name</label>
<input
type="text"
id="accountName"
readonly
placeholder="Account name will appear here">
</div>

<div class="group">
<label>Amount</label>
<input
type="number"
id="amount"
placeholder="Enter Amount">
</div>

<div class="group">
<label>Description</label>
<input
type="text"
id="description"
placeholder="Transfer description">
</div>

<button class="send-btn" onclick="confirmTransfer()">
Send Money
</button>

</div>

<div class="loading" id="loading">
<div class="spinner"></div>
<p style="margin-top:15px;">
Processing Transaction...
</p>
</div>
<div class="result" id="result">

    <div style="font-size:70px;">❌</div>

    <h2>Transaction Failed</h2>

    <p>
        Please contact support service.<br>
        Thank you.
    </p>

    <div style="margin-top:25px;">

        <button class="send-btn" onclick="contactSupport()">
            Contact Support
        </button>

        <button
            class="send-btn"
            style="background:#555;margin-top:10px;"
            onclick="closePage()">
            Close
        </button>

    </div>

</div>


</div>

</div>

<!-- CONFIRM MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<h2>Confirm Transfer</h2>

<p id="confirmDetails"></p>

<button class="confirm-btn" onclick="processTransfer()">
Confirm Transfer
</button>

</div>

</div>

<script>

/* DEMO ACCOUNTS */

const accounts = {
"1234567890":"John Smith",
"1111111111":"Empire Muller",
"2222222222":"Sarah Johnson",
"3333333333":"Michael Brown",
"4444444444":"David Wilson"
};

const accountInput =
document.getElementById("accountNumber");

const accountName =
document.getElementById("accountName");

const verifyText =
document.getElementById("verifyText");

accountInput.addEventListener("input",function(){

let acc = this.value;

accountName.value = "";

if(acc.length < 10){
verifyText.innerHTML = "";
return;
}

verifyText.innerHTML =
"🔄 Verifying Account...";

setTimeout(function(){

if(accounts[acc]){

verifyText.innerHTML =
"✅ Account Verified";

accountName.value =
accounts[acc];

}else{

verifyText.innerHTML =
"❌ Error ";

accountName.value = "";

}

},1500);

});

function confirmTransfer(){

let accountName =
document.getElementById("accountName").value;

let amount =
document.getElementById("amount").value;

let description =
document.getElementById("description").value;

if(accountName==""){
alert("Please enter a valid account number.");
return;
}

if(amount==""){
alert("Please enter an amount.");
return;
}

if(description==""){
alert("Please enter a description.");
return;
}

document.getElementById("confirmDetails").innerHTML =
"Recipient: <b>" + accountName + "</b><br><br>" +
"Amount: <b>$" + amount + "</b><br><br>" +
"Description: <b>" + description + "</b><br><br>" +
"Please confirm this transfer.";

document.getElementById("modal").style.display =
"flex";

}

function processTransfer(){

    document.getElementById("modal").style.display =
    "none";

    document.getElementById("transferCard").style.display =
    "none";

    document.getElementById("loading").style.display =
    "block";

    setTimeout(function(){

        document.getElementById("loading").style.display =
        "none";

        document.getElementById("result").style.display =
        "block";

    },3000);

}

function contactSupport(){

    window.location.href = "ai.html?from=transfer";

}


function exitTransfer(){

    window.location.href = "dashboard.html";

}


function closePage(){

    window.location.href = "dashboard.html";



}
</script>

</body>
</html>
