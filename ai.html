<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>Axos AI Support</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial;
}
body{
background:#0b1b3a;
height:100vh;
display:flex;
flex-direction:column;
}
/* HEADER */
.header{
background:#102a5c;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1c3b73;
}
.left{
display:flex;
align-items:center;
gap:10px;
}
.logo{
width:42px;
height:42px;
border-radius:50%;
background:#2563eb;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:18px;
}
.name{
color:white;
font-weight:600;
font-size:18px;
}
.sub{
font-size:13px;
color:#94a3b8;
}
.close{
width:45px;
height:45px;
border-radius:50%;
background:#1c3b73;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:white;
text-decoration:none;
}
/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:15px;
}
.bot,.user{
max-width:80%;
padding:14px 18px;
border-radius:20px;
margin-bottom:10px;
font-size:16px;
line-height:1.4;
animation:fadeIn .25s ease;
}
.bot{
background:#1e2f55;
color:#e5e7eb;
}
.user{
background:#2563eb;
color:white;
margin-left:auto;
}
/* typing dots */
.typing{
display:flex;
gap:5px;
padding:12px;
background:#1e2f55;
border-radius:20px;
width:60px;
}
.dot{
width:8px;
height:8px;
background:#cbd5e1;
border-radius:50%;
animation:blink 1.4s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{
0%,80%,100%{opacity:.2}
40%{opacity:1}
}
@keyframes fadeIn{
from{opacity:0; transform:translateY(5px);}
to{opacity:1;}
}
/* OPTIONS */
.options{
padding:12px;
display:flex;
flex-wrap:wrap;
gap:8px;
background:#102a5c;
}
.option{
padding:12px 16px;
border-radius:25px;
border:1px solid #2b4f8a;
background:#0b1b3a;
color:#cbd5e1;
font-size:14px;
cursor:pointer;
transition:.2s;
}
.option:active{
transform:scale(.95);
background:#1e40af;
color:white;
}
</style>
</head>
<body>
<div class="header">
<div class="left">
<div class="logo">🤖</div>
<div>
<div class="name">Axos AI Agent</div>
<div class="sub">Online</div>
</div>
</div>
<a href="menu.html" class="close">×</a>
</div>
<div class="chat" id="chat">
<div class="bot">
<b>Axos AI</b><br><br>
Hello Ben,<br><br>
Welcome to Axos Bank.<br><br>
How can we assist you today?
</div>
</div>
<div class="options" id="options"></div>
<script>
let transferCount = 0;
function addUser(text){
chat.innerHTML += `<div class="user">${text}</div>`;
scroll();
}
function addBot(text){
removeTyping();
chat.innerHTML += `<div class="bot"><b>Axos AI</b><br><br>${text}</div>`;
scroll();
}
function showTyping(){
chat.innerHTML += `
<div class="typing" id="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>`;
scroll();
}
function removeTyping(){
let t = document.getElementById("typing");
if(t) t.remove();
}
function scroll(){
chat.scrollTop = chat.scrollHeight;
}
function setOptions(btns){
options.innerHTML="";
btns.forEach(b=>{
options.innerHTML += `
<button class="option" onclick="quick('${b.type}','${b.text}')">
${b.text}
</button>`;
});
}
function quick(type,label){
addUser(label);
showTyping();
setTimeout(()=>{
let reply="";
if(type==="account"){
reply="Please select your account issue:";
setOptions([
{text:"Reset Password",type:"reset"},
{text:"Update Phone Number",type:"phone"},
{text:"Freeze Account",type:"freeze"}
]);
}
else if(type==="reset"){
reply="Click 'Forgot Password' on login screen.<br><br>Did this help?";
setOptions([
{text:"Yes",type:"done"},
{text:"No",type:"agent"}
]);
}
else if(type==="phone"){
reply="Go to Settings → Profile to update your number.";
setOptions([{text:"Done",type:"done"}]);
}
else if(type==="freeze"){
reply="Your account can be frozen for security.";
setOptions([
{text:"Freeze Now",type:"done"},
{text:"Cancel",type:"done"}
]);
}
else if(type==="done"){
reply="Glad we could help.";
setOptions([{text:"Back to Menu",type:"menu"}]);
}
else if(type==="menu"){
reply="What do you need help with?";
setOptions(mainMenu);
}
else if(type==="transfer"){
transferCount++;
if(transferCount===1){
reply="Transfer failed. Please check details and retry.";
}
else if(transferCount===2){
reply="Still failing. Our team may review it.";
}
else{
reply="Contact support:<br><b>@Axos.service@hotmail.com</b>";
}
setOptions([
{text:"Try Again",type:"transfer"},
{text:"Back to Menu",type:"menu"}
]);
}
else if(type==="card"){
reply="Card request received. Processing in 3–5 days.";
setOptions([{text:"Back to Menu",type:"menu"}]);
}
else if(type==="saving"){
reply="Savings accounts offer competitive interest.";
setOptions([{text:"Back to Menu",type:"menu"}]);
}
else if(type==="invest"){
reply="Investment services available for eligible users.";
setOptions([{text:"Back to Menu",type:"menu"}]);
}
addBot(reply);
},900);
}
const mainMenu = [
{text:"Report Failed Transaction",type:"transfer"},
{text:"Account Issue",type:"account"},
{text:"Card Request",type:"card"},
{text:"Savings",type:"saving"},
{text:"Invest",type:"invest"}
];
setOptions(mainMenu);
</script>
</body>
</html>
